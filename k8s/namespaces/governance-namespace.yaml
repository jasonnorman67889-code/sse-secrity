apiVersion: v1
kind: Namespace
metadata:
  name: governance
  labels:
    app.kubernetes.io/name: sovereign-command-center
    app.kubernetes.io/part-of: sovereign-defense-lab
    sovereign.io/layer: governance
    sovereign.io/isolated: "true"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: governance-quota
  namespace: governance
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "2"
    limits.memory: 4Gi
    pods: "12"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: governance-readonly
  namespace: governance
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
