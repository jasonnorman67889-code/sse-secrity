apiVersion: v1
kind: Namespace
metadata:
  name: replay
  labels:
    app.kubernetes.io/name: sovereign-command-center
    app.kubernetes.io/part-of: sovereign-defense-lab
    sovereign.io/layer: replay
    sovereign.io/isolated: "true"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: replay-default-limits
  namespace: replay
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 150m
        memory: 256Mi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: replay-allow-egress-observability
  namespace: replay
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              sovereign.io/layer: governance
