apiVersion: v1
kind: Namespace
metadata:
  name: fraud-defense
  labels:
    app.kubernetes.io/name: sovereign-command-center
    app.kubernetes.io/part-of: sovereign-defense-lab
    sovereign.io/layer: fraud-defense
    sovereign.io/isolated: "true"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: fraud-defense-limits
  namespace: fraud-defense
spec:
  limits:
    - type: Container
      default:
        cpu: 400m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fraud-defense-egress-governance
  namespace: fraud-defense
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              sovereign.io/layer: governance
