apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: simulation-telemetry-pvc
  namespace: simulation
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: replay-timeline-pvc
  namespace: replay
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: governance-audit-pvc
  namespace: governance
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: simulation-egress-telemetry-and-fraud-defense
  namespace: simulation
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              sovereign.io/layer: telemetry
    - to:
        - namespaceSelector:
            matchLabels:
              sovereign.io/layer: fraud-defense
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: telemetry-ingress-from-simulation
  namespace: telemetry
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              sovereign.io/layer: simulation
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: replay-egress-governance
  namespace: replay
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              sovereign.io/layer: governance
